name: Build HIIT Timer APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web app
        run: npm run build

      - name: Add Capacitor Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Force copy app icons
        run: |
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p android/app/src/main/res/mipmap-${density}
            rm -f android/app/src/main/res/mipmap-${density}/ic_launcher.png
            rm -f android/app/src/main/res/mipmap-${density}/ic_launcher_round.png
            rm -f android/app/src/main/res/mipmap-${density}/ic_launcher_foreground.png
            rm -f android/app/src/main/res/mipmap-${density}/ic_launcher_background.png
          done
          rm -f android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          rm -f android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml
          cp icons/mipmap-mdpi/ic_launcher.png          android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp icons/mipmap-mdpi/ic_launcher_round.png    android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          cp icons/mipmap-hdpi/ic_launcher.png          android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp icons/mipmap-hdpi/ic_launcher_round.png    android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          cp icons/mipmap-xhdpi/ic_launcher.png         android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp icons/mipmap-xhdpi/ic_launcher_round.png   android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          cp icons/mipmap-xxhdpi/ic_launcher.png        android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp icons/mipmap-xxhdpi/ic_launcher_round.png  android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          cp icons/mipmap-xxxhdpi/ic_launcher.png       android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          cp icons/mipmap-xxxhdpi/ic_launcher_round.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png
          echo "✅ Icons copied"
          ls android/app/src/main/res/mipmap-xxhdpi/

      - name: Update to Android 14 (API 34)
        run: |
          sed -i 's/compileSdkVersion = 33/compileSdkVersion = 34/' android/variables.gradle
          sed -i 's/compileSdk 33/compileSdk 34/' android/app/build.gradle
          sed -i 's/targetSdkVersion = 33/targetSdkVersion = 34/' android/variables.gradle
          sed -i 's/targetSdk 33/targetSdk 34/' android/app/build.gradle
          echo "✅ Android SDK updated to 34"
          grep -E "compileSdk|targetSdk" android/variables.gradle || true
          grep -E "compileSdk|targetSdk" android/app/build.gradle || true

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/hiit-timer.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: HIIT-Interval-Timer-APK
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
